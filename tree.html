<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuruluş Şeması - Ağaç Yapısı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            overflow: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
            font-size: 1.1em;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button.secondary {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
        }

        .svg-container {
            display: flex;
            justify-content: center;
            overflow: auto;
            background: #f7fafc;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            min-height: 700px;
        }

        svg {
            max-width: 100%;
            height: auto;
        }

        .org-box {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .org-box:hover rect {
            filter: brightness(0.9);
        }

        .org-text {
            pointer-events: none;
            user-select: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .svg-container {
                min-height: 500px;
                padding: 20px;
            }

            button {
                font-size: 0.9em;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>

        <div class="header">

            <p>Modern Organizasyon Yapısı - 2026</p>

    </div>

    <script>
        function downloadSVG() {
            try {
                const svg = document.getElementById('orgChart');
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const svgData = new XMLSerializer().serializeToString(svg);
                const img = new Image();

                canvas.width = 1400;
                canvas.height = 900;

                img.onload = function() {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = 'kurulusYapisi.png';
                    link.click();
                };

                img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
            } catch (error) {
                alert('Indirme hatasi: ' + error.message);
            }
        }

        function downloadSVGVector() {
            try {
                const svg = document.getElementById('orgChart');
                const svgData = new XMLSerializer().serializeToString(svg);
                const blob = new Blob([svgData], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'kurulusYapisi.svg';
                link.click();
                URL.revokeObjectURL(url);
            } catch (error) {
                alert('Indirme hatasi: ' + error.message);
            }
        }

        function printDiagram() {
            window.print();
        }
    </script>
</body>
