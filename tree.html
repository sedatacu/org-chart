<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuruluş Şeması</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: auto;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .page {
            background: white;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1a365d;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #718096;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .org-chart {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
            background: white;
        }

        svg {
            display: block;
            margin: 0 auto;
        }

        @media print {
            body {
                background: white;
                margin: 0;
            }
            .page {
                padding: 20px;
                min-height: auto;
            }
            .controls, .header p {
                display: none;
            }
            .org-chart {
                overflow: visible;
            }
        }

        @page {
            size: A3 landscape;
            margin: 10mm;
        }
    </style>
</head>

    <script>
        function downloadPNG() {
            const svg = document.getElementById('orgChart');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 2800;
            canvas.height = 1400;

            const svgData = new XMLSerializer().serializeToString(svg);
            const img = new Image();

            img.onload = function() {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'Kurulusyapisi_YuksekKalite.png';
                link.click();
            };

            img.onerror = function() {
                alert('Resim indirme hatası!');
            };

            img.src = 'data:image/svg+xml;base64,' + btoa(svgData);
        }

        function downloadSVG() {
            const svg = document.getElementById('orgChart');
            const svgData = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([svgData], { type: 'image/svg+xml' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Kurulusyapisi_Vektor.svg';
            link.click();
        }
    </script>
