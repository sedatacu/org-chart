<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuruluş Şeması - Ağaç Yapısı</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            overflow: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
            font-size: 1.1em;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button.secondary {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
        }

        .mermaid-container {
            display: flex;
            justify-content: center;
            overflow-x: auto;
            background: #f7fafc;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 600px;
        }

        .mermaid {
            display: flex;
            justify-content: center;
        }

        .edit-info {
            background: #edf2f7;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #2d3748;
            font-size: 0.95em;
        }

        .edit-info.hidden {
            display: none;
        }

        .data-section {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
        }

        .data-section h2 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .mermaid-container {
                min-height: 400px;
            }

            .controls {
                flex-direction: column;
                gap: 10px;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 Kuruluş Şeması - Ağaç Yapısı</h1>
            <p>Modern Organizasyon Yapısı - 2026</p>
        </div>

        <div class="controls">
            <button onclick="toggleEditMode()" id="editToggleBtn">✏️ Düzenle Modunu Aç</button>
            <button class="secondary" onclick="downloadDiagram()">📥 Resim Olarak İndir</button>
            <button class="secondary" onclick="resetData()">🔄 Orijinal Verileri Yükle</button>
        </div>

        <div class="edit-info hidden" id="editInfo">
            📝 Düzenle modunda: Aşağıdaki metin alanında organizasyon yapısını değiştirebilir ve "Güncelle" butonuna tıklayabilirsiniz.
        </div>

        <div class="mermaid-container" id="mermaidContainer">
            <div class="mermaid" id="mermaidDiagram"></div>
        </div>

        <div class="data-section hidden" id="editSection">
            <h2>📋 Organizasyon Yapısını Düzenle</h2>
            <textarea id="diagramData" placeholder="Organizasyon verileri..."></textarea>
            <div class="button-group">
                <button onclick="updateDiagram()">✅ Güncelle</button>
                <button class="secondary" onclick="toggleEditMode()">❌ İptal</button>
            </div>
        </div>
    </div>

    <script>
        // Mermaid konfigürasyonu
        mermaid.initialize({ 
            startOnLoad: true, 
            theme: 'default',
            flowchart: {
                useMaxWidth: true,
                padding: 20
            }
        });

        const defaultData = `graph TD
    CEO["🏢 CEO<br/>Sibel Tanır"]
    
    CEO --> GM["👤 Genel Müdür<br/>Selçuk Çiftçi"]
    CEO --> Finans["💰 Finans<br/>Elçin Hanım"]
    
    GM --> Uretim["🏭 Üretim<br/>Tayfun Usta"]
    GM --> Fabrika["🧱 Fabrika"]
    GM --> ArGe["🔬 Ar-Ge / Lab"]
    GM --> Satinalma["🛒 Satınalma"]
    GM --> Pazarlama["📣 Pazarlama"]
    GM --> IK["👥 İnsan Kaynakları"]
    GM --> Idari["📦 İdari İşler"]
    GM --> GMY["👔 GMY - Satış<br/>İsmail Ökten"]
    
    GMY --> Yici["🌍 Yurtiçi Satış"]
    GMY --> Ydisi["✈️ Yurtdışı Satış<br/>Sedat Acu"]
    GMY --> Proje["📐 Proje Sorumlusu<br/>Ardahan Bey"]
    GMY --> Lojistik["🚚 Lojistik<br/>Erkan Bey"]
    GMY --> Muhasebe["💼 Ön Muhasebe<br/>Nisa Hanım"]
    GMY --> TekOfis["💻 Teknik Ofis"]
    
    Yici --> Korfez["📍 Körfez<br/>Cüneyt Bey"]
    Yici --> Avrupa["📍 Avrupa<br/>Gürkan Bey"]
    Yici --> Anadolu["📍 Anadolu<br/>İbrahim Bey"]
    
    TekOfis --> TekMud["🛠️ Teknik Müdür<br/>Sedat Acu"]
    TekOfis --> Supervizor["🚧 Süpervizör"]
    TekOfis --> TekEleman["📄 Teknik Ofis<br/>Funda Hanım"]
    
    style CEO fill:#1a365d,stroke:#fff,stroke-width:3px,color:#fff
    style GM fill:#2b6cb0,stroke:#fff,stroke-width:2px,color:#fff
    style Finans fill:#2f855a,stroke:#fff,stroke-width:2px,color:#fff
    style GMY fill:#2c5282,stroke:#fff,stroke-width:2px,color:#fff`;

        let editMode = false;

        // Verileri yükle
        function loadData() {
            const saved = localStorage.getItem('orgChartMermaid');
            return saved || defaultData;
        }

        // Verileri kaydet
        function saveData(data) {
            localStorage.setItem('orgChartMermaid', data);
        }

        // Diyagramı güncelle
        function renderDiagram(data) {
            const container = document.getElementById('mermaidDiagram');
            container.innerHTML = data;
            mermaid.contentLoaded();
        }

        // Düzenle modunu aç/kapat
        function toggleEditMode() {
            editMode = !editMode;
            const btn = document.getElementById('editToggleBtn');
            const section = document.getElementById('editSection');
            const info = document.getElementById('editInfo');
            const textarea = document.getElementById('diagramData');

            if (editMode) {
                btn.textContent = '❌ Düzenle Modunu Kapat';
                section.classList.remove('hidden');
                info.classList.remove('hidden');
                textarea.value = localStorage.getItem('orgChartMermaid') || defaultData;
            } else {
                btn.textContent = '✏️ Düzenle Modunu Aç';
                section.classList.add('hidden');
                info.classList.add('hidden');
            }
        }

        // Diyagramı güncelle
        function updateDiagram() {
            const data = document.getElementById('diagramData').value;
            if (data.trim()) {
                saveData(data);
                renderDiagram(data);
                toggleEditMode();
            } else {
                alert('Lütfen diyagram verisi girin!');
            }
        }

        // Orijinal verileri yükle
        function resetData() {
            if (confirm('Orijinal verileri yüklemek istiyor musunuz?')) {
                localStorage.removeItem('orgChartMermaid');
                renderDiagram(defaultData);
                if (editMode) {
                    toggleEditMode();
                }
            }
        }

        // Resim olarak indir
        async function downloadDiagram() {
            try {
                const svg = document.querySelector('.mermaid svg');
                if (!svg) {
                    alert('Diyagram yüklenmedi!');
                    return;
                }

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const svgData = new XMLSerializer().serializeToString(svg);
                const img = new Image();

                canvas.width = svg.clientWidth;
                canvas.height = svg.clientHeight;

                img.onload = function() {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = 'kurulusYapisi.png';
                    link.click();
                };

                img.src = 'data:image/svg+xml;base64,' + btoa(svgData);
            } catch (error) {
                alert('Resim indirme hatası: ' + error.message);
            }
        }

        // Sayfa yüklendığında
        document.addEventListener('DOMContentLoaded', function() {
            const data = loadData();
            renderDiagram(data);
        });
    </script>
</body>
</html>
