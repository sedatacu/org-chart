<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuruluş Şeması</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .page {
            background: white;
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #1a365d;
            font-size: 26px;
            margin-bottom: 3px;
        }

        .header p {
            color: #718096;
            font-size: 13px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: #f0f4f8;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button.secondary {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
        }

        button.primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-size: 14px;
            padding: 12px 25px;
            font-weight: 700;
        }

        .org-chart {
            flex: 1;
            overflow: auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
        }

        svg {
            display: block;
            margin: 0 auto;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal h2 {
            color: #1a365d;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            color: #2d3748;
            font-weight: 600;
            font-size: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 12px;
            font-family: Arial;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .close {
            color: #718096;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            line-height: 1;
        }

        .close:hover {
            color: #2d3748;
        }

        @media print {
            body {
                background: white;
                margin: 0;
            }
            .page {
                padding: 20px;
                min-height: auto;
            }
            .controls, .header p {
                display: none;
            }
            .org-chart {
                overflow: visible;
                border: none;
                padding: 0;
            }
        }

        @page {
            size: A3 landscape;
            margin: 10mm;
        }
    </style>
</head>

            document.getElementById('editModal').classList.remove('active');

        function saveChanges() {

            document.getElementById('fin-name').textContent = document.getElementById('finInput').value || 'Elcin Hanim';

            document.getElementById('gmy-name').textContent = document.getElementById('gmyInput').value || 'Ismail Okten';
            document.getElementById('sales1-name').textContent = document.getElementById('sales1Input').value || 'Sedat Acu';
            document.getElementById('sales2-name').textContent = document.getElementById('sales2Input').value || 'Ardahan Bey';
            document.getElementById('sales3-name').textContent = document.getElementById('sales3Input').value || 'Erkan Bey';
            document.getElementById('sales4-name').textContent = document.getElementById('sales4Input').value || 'Nisa Hanim';
            document.getElementById('region1-name').textContent = document.getElementById('region1Input').value || 'Cuneyt Bey';
            document.getElementById('region2-name').textContent = document.getElementById('region2Input').value || 'Gurkan Bey';
            document.getElementById('region3-name').textContent = document.getElementById('region3Input').value || 'Ibrahim Bey';
            document.getElementById('tech1-name').textContent = document.getElementById('tech1Input').value || 'Sedat Acu';
            document.getElementById('tech2-name').textContent = document.getElementById('tech2Input').value || 'Funda Hanim';
            
            closeEditModal();
        }

        function downloadPNG() {
            const svg = document.getElementById('orgChart');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 2800;
            canvas.height = 1400;

            const svgData = new XMLSerializer().serializeToString(svg);
            const img = new Image();

            img.onload = function() {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'Kurulusyapisi_YuksekKalite.png';
                link.click();
            };

            img.onerror = function() {
                alert('Resim indirme hatasi!');
            };

            img.src = 'data:image/svg+xml;base64,' + btoa(svgData);
        }

        function downloadSVG() {
            const svg = document.getElementById('orgChart');
            const svgData = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([svgData], { type: 'image/svg+xml' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Kurulusyapisi_Vektor.svg';
            link.click();
        }

        // Modal dısında tıklandığında kapat
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
